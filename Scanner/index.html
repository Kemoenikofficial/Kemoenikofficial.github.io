<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Kasir Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

h1{
background:#00c853;
margin:0;
padding:15px;
font-size:20px;
}

#reader{
width:100%;
max-width:400px;
margin:auto;
margin-top:20px;
}

</style>

</head>

<body>

<h1>SCAN PRODUK</h1>

<div id="reader"></div>

<script>

function bunyi(){
var audio = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
audio.play();
}

function onScanSuccess(decodedText) {

bunyi();

alert("Barcode: " + decodedText);

}

let scanner = new Html5QrcodeScanner(
"reader",
{ fps: 10, qrbox: 250 });

scanner.render(onScanSuccess);

</script>

</body>
</html>
