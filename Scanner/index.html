<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Kemoenik POS</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#f4f6f8;
}

/* HEADER */

.header{
background:#16a34a;
color:white;
text-align:center;
padding:16px;
font-size:20px;
font-weight:bold;
}

/* CONTAINER */

.container{
padding:15px;
}

/* SCANNER */

#reader{
width:100%;
border-radius:12px;
overflow:hidden;
margin-bottom:15px;
}

/* CART */

.cart{
background:white;
border-radius:12px;
padding:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.item{
display:flex;
justify-content:space-between;
padding:10px;
border-bottom:1px solid #eee;
}

.total{
font-size:18px;
font-weight:bold;
padding:15px;
text-align:right;
}

button{
background:#ef4444;
color:white;
border:none;
padding:5px 10px;
border-radius:6px;
}

</style>

</head>

<body>

<div class="header">
KEMOENIK POS
</div>

<div class="container">

<div id="reader"></div>

<div class="cart">

<div id="list"></div>

<div class="total">
Total: Rp <span id="total">0</span>
</div>

</div>

</div>

<script>

/* =====================
MASUKKAN LINK APPS SCRIPT
===================== */

const API_URL = "https://script.google.com/macros/s/AKfycbxD3aTQrCsZXlitaZf59VLZSPBtwkMI5L0AyWpOKSEcpUrmo_IV9W7_6QlOS_NLTgFWTw/exec";

/* ===================== */

let keranjang=[];
let total=0;

function bunyi(){
var audio=new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
audio.play();
}

function render(){

let list=document.getElementById("list");

list.innerHTML="";

keranjang.forEach((item,index)=>{

list.innerHTML+=`
<div class="item">
<div>
${item.nama}<br>
Rp ${item.harga}
</div>

<button onclick="hapus(${index})">X</button>
</div>
`;

});

document.getElementById("total").innerText=total;

}

function hapus(index){

total-=keranjang[index].harga;

keranjang.splice(index,1);

render();

}

/* =====================
SCAN BARCODE
===================== */

function onScanSuccess(barcode){

fetch(API_URL+"?barcode="+barcode)

.then(res=>res.json())

.then(data=>{

bunyi();

keranjang.push({
nama:data.nama,
harga:Number(data.harga)
});

total+=Number(data.harga);

render();

})

.catch(err=>{

alert("Produk tidak ditemukan");

});

}

let scanner=new Html5QrcodeScanner(
"reader",
{fps:10,qrbox:250}
);

scanner.render(onScanSuccess);

</script>

</body>
</html>
