<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Kemoenik POS</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f8;
}

.header{
background:#16a34a;
color:white;
text-align:center;
padding:16px;
font-size:20px;
font-weight:bold;
}

.container{
padding:15px;
}

#reader{
width:100%;
margin-bottom:10px;
}

.scanbtn{
width:100%;
padding:14px;
background:#16a34a;
color:white;
border:none;
border-radius:8px;
font-size:16px;
margin-bottom:15px;
}

.cart{
background:white;
border-radius:10px;
padding:10px;
}

.item{
display:flex;
justify-content:space-between;
padding:10px;
border-bottom:1px solid #eee;
}

.total{
font-size:20px;
font-weight:bold;
padding:15px;
text-align:right;
}

button{
background:#ef4444;
color:white;
border:none;
padding:6px 10px;
border-radius:6px;
}

</style>

</head>

<body>

<div class="header">
KEMOENIK POS
</div>

<div class="container">

<div id="reader"></div>

<button class="scanbtn" onclick="scanManual()">
SCAN PRODUK
</button>

<div class="cart">

<div id="list"></div>

<div class="total">
Total: Rp <span id="total">0</span>
</div>

</div>

</div>

<script>

/* =======================
LINK APPS SCRIPT
======================= */

const API_URL = "https://script.google.com/macros/s/AKfycbxD3aTQrCsZXlitaZf59VLZSPBtwkMI5L0AyWpOKSEcpUrmo_IV9W7_6QlOS_NLTgFWTw/exec";

/* ======================= */

let keranjang=[];
let total=0;
let lastBarcode="";

/* =======================
FORMAT RUPIAH
======================= */

function formatRupiah(angka){
return new Intl.NumberFormat('id-ID',{
minimumFractionDigits:2,
maximumFractionDigits:2
}).format(angka);
}

/* =======================
SUARA TIT SCANNER
======================= */

function bunyi(){

const context = new (window.AudioContext || window.webkitAudioContext)();
const oscillator = context.createOscillator();
const gain = context.createGain();

oscillator.type="square";
oscillator.frequency.value=1000;

oscillator.connect(gain);
gain.connect(context.destination);

oscillator.start();

setTimeout(()=>{
oscillator.stop();
},120);

}

/* =======================
RENDER KERANJANG
======================= */

function render(){

let list=document.getElementById("list");

list.innerHTML="";

keranjang.forEach((item,index)=>{

list.innerHTML+=`
<div class="item">
<div>
${item.nama}<br>
Rp ${formatRupiah(item.harga)}
</div>

<button onclick="hapus(${index})">X</button>
</div>
`;

});

document.getElementById("total").innerText=formatRupiah(total);

}

/* =======================
HAPUS ITEM
======================= */

function hapus(index){

total-=keranjang[index].harga;

keranjang.splice(index,1);

render();

}

/* =======================
SCAN DARI KAMERA
======================= */

function onScanSuccess(decodedText){

console.log("Barcode terbaca:", decodedText);

lastBarcode=decodedText;

}

/* =======================
TOMBOL SCAN MANUAL
======================= */

function scanManual(){

if(!lastBarcode){
alert("Scan barcode dulu");
return;
}

bunyi();

fetch(API_URL+"?barcode="+lastBarcode)

.then(res=>res.json())

.then(data=>{

keranjang.push({
nama:data.nama,
harga:Number(data.harga)
});

total+=Number(data.harga);

render();

lastBarcode="";

})

.catch(()=>{
alert("Produk tidak ditemukan");
});

}

/* =======================
START SCANNER
======================= */

let scanner=new Html5QrcodeScanner(
"reader",
{fps:10,qrbox:250}
);

scanner.render(onScanSuccess);

</script>

</body>
</html>
