<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Kemoenik POS</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#f4f6f8;
}

/* HEADER */

.header{
background:#16a34a;
color:white;
text-align:center;
padding:16px;
font-size:20px;
font-weight:bold;
}

/* CONTAINER */

.container{
padding:15px;
}

/* SCANNER */

#reader{
width:100%;
border-radius:12px;
overflow:hidden;
margin-bottom:15px;
}

/* CART */

.cart{
background:white;
border-radius:12px;
padding:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.item{
display:flex;
justify-content:space-between;
padding:10px;
border-bottom:1px solid #eee;
}

.total{
font-size:18px;
font-weight:bold;
padding:15px;
text-align:right;
}

button{
background:#ef4444;
color:white;
border:none;
padding:5px 10px;
border-radius:6px;
}

</style>

</head>

<body>

<div class="header">
KEMOENIK POS
</div>

<div class="container">

<div id="reader"></div>

<div class="cart">

<div id="list"></div>

<div class="total">
Total: Rp <span id="total">0</span>
</div>

</div>

</div>

<script>

/* DATABASE PRODUK */

const produk = {
"8992761140023":{nama:"Indomie Goreng",harga:3500},
"8996001600267":{nama:"Aqua 600ml",harga:4000},
"8998888800123":{nama:"Teh Botol",harga:5000}
};

let keranjang=[];
let total=0;

function bunyi(){
var audio=new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
audio.play();
}

function tambahItem(barcode){

if(!produk[barcode]){
alert("Produk tidak ditemukan");
return;
}

bunyi();

let item=produk[barcode];

keranjang.push(item);

total+=item.harga;

render();

}

function render(){

let list=document.getElementById("list");

list.innerHTML="";

keranjang.forEach((item,index)=>{

list.innerHTML+=`
<div class="item">
<div>
${item.nama}<br>
Rp ${item.harga}
</div>

<button onclick="hapus(${index})">X</button>
</div>
`;

});

document.getElementById("total").innerText=total;

}

function hapus(index){

total-=keranjang[index].harga;

keranjang.splice(index,1);

render();

}

/* SCANNER */

function onScanSuccess(decodedText){

tambahItem(decodedText);

}

let scanner=new Html5QrcodeScanner(
"reader",
{fps:10,qrbox:250}
);

scanner.render(onScanSuccess);

</script>

</body>
</html>
