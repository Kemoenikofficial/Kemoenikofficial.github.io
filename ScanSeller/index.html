<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>KEMOENIK POS</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f8;
}

.header{
background:#16a34a;
color:white;
text-align:center;
padding:16px;
font-size:22px;
font-weight:bold;
}

.container{
padding:15px;
}

#reader{
width:100%;
margin-bottom:15px;
}

.scanbtn{
width:100%;
padding:14px;
background:#16a34a;
color:white;
border:none;
border-radius:10px;
font-size:18px;
margin-bottom:15px;
}

select{
width:100%;
padding:12px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #ddd;
font-size:16px;
}

.total{
background:white;
border-radius:12px;
padding:20px;
font-size:22px;
text-align:right;
font-weight:bold;
}

</style>

</head>

<body>

<div class="header">
KEMOENIK POS
</div>

<div class="container">

<div id="reader"></div>

<button class="scanbtn" onclick="scanManual()">
SCAN PRODUK
</button>

<select id="seller"></select>

<select id="produk"></select>

<select id="harga">
<option value="70000">70000</option>
<option value="30000">30000</option>
</select>

<div class="total">
Total: Rp <span id="total">0</span>
</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbwMKriFGgT9WLy3AGVXPNoK8aY9PdCOBjrNKIEQkjzXAKjGVwp8113faSyUDHGiGoE6/exec";

let lastBarcode="";
let total=0;

/* LOAD SELLER */

fetch(API+"?action=seller")
.then(res=>res.json())
.then(data=>{

let s=document.getElementById("seller");

data.forEach(i=>{
s.innerHTML+=`<option>${i[0]}</option>`;
});

});


/* LOAD PRODUK */

fetch(API+"?action=produk")
.then(res=>res.json())
.then(data=>{

let p=document.getElementById("produk");

data.forEach(i=>{
p.innerHTML+=`<option>${i[0]}</option>`;
});

});


/* SOUND */

function bunyi(){

const ctx=new(window.AudioContext||window.webkitAudioContext)();
const osc=ctx.createOscillator();
const gain=ctx.createGain();

osc.type="square";
osc.frequency.value=1000;

osc.connect(gain);
gain.connect(ctx.destination);

osc.start();

setTimeout(()=>{osc.stop();},120);

}


/* SCAN SUCCESS */

function onScanSuccess(decodedText){

lastBarcode=decodedText;

}


/* SCAN BUTTON */

function scanManual(){

if(!lastBarcode){
alert("Scan barcode dulu");
return;
}

bunyi();

let seller=document.getElementById("seller").value;
let produk=document.getElementById("produk").value;
let harga=document.getElementById("harga").value;

fetch(API+"?action=scan&resi="+lastBarcode+"&seller="+seller+"&produk="+produk+"&harga="+harga)

.then(res=>res.json())
.then(data=>{

if(data.status=="duplicate"){
alert("RESI SUDAH ADA");
return;
}

total+=Number(harga);

document.getElementById("total").innerText=total;

lastBarcode="";

});

}


/* START CAMERA */

let scanner=new Html5QrcodeScanner(
"reader",
{fps:10,qrbox:250}
);

scanner.render(onScanSuccess);

</script>

</body>
</html>
