<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>SCAN RESI</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Arial;
background:#f4f6f8;
margin:0;
}

.header{
background:#16a34a;
color:white;
text-align:center;
padding:15px;
font-size:20px;
}

.container{
padding:20px;
}

button{
width:100%;
padding:15px;
margin-bottom:10px;
border:none;
border-radius:8px;
font-size:16px;
}

.scan{
background:#16a34a;
color:white;
}

.stop{
background:#ef4444;
color:white;
}

select{
width:100%;
padding:10px;
margin-top:10px;
}

#reader{
margin-top:15px;
}

</style>

</head>

<body>

<div class="header">
SCAN RESI
</div>

<div class="container">

<button class="scan" onclick="startScan()">SCAN</button>
<button class="stop" onclick="stopScan()">STOP</button>

<div id="reader"></div>

<select id="seller"></select>

<select id="produk"></select>

<select id="harga">

<option value="70000">70000</option>
<option value="30000">30000</option>

</select>

</div>


<script>

const API="https://script.google.com/macros/s/AKfycbx87tt-MUpUG_nNSHVQ4N7_N0N6ORhjOR6yk8Fcvq_rHK6m8_tl708CRgAk1UI_o0bN/execT";

let scanner;


/* LOAD SELLER */

fetch(API+"?action=seller")
.then(res=>res.json())
.then(data=>{

let s=document.getElementById("seller");

data.forEach(i=>{
s.innerHTML+=`<option>${i[0]}</option>`;
});

});


/* LOAD PRODUK */

fetch(API+"?action=produk")
.then(res=>res.json())
.then(data=>{

let p=document.getElementById("produk");

data.forEach(i=>{
p.innerHTML+=`<option>${i[0]}</option>`;
});

});


/* BUNYI */

function bunyi(){

const ctx=new(window.AudioContext||window.webkitAudioContext)();
const osc=ctx.createOscillator();
const gain=ctx.createGain();

osc.type="square";
osc.frequency.value=1000;

osc.connect(gain);
gain.connect(ctx.destination);

osc.start();

setTimeout(()=>{
osc.stop();
},120);

}


/* START SCAN */

function startScan(){

scanner=new Html5Qrcode("reader");

scanner.start(
{ facingMode:"environment" },
{ fps:10, qrbox:250 },

(decodedText)=>{

bunyi();

let seller=document.getElementById("seller").value;
let produk=document.getElementById("produk").value;
let harga=document.getElementById("harga").value;

fetch(API+"?action=scan&resi="+decodedText+"&seller="+seller+"&produk="+produk+"&harga="+harga)

.then(res=>res.json())
.then(data=>{

if(data.status=="duplicate"){
alert("RESI SUDAH ADA");
return;
}

console.log("saved");

});

}

);

}


/* STOP */

function stopScan(){

if(scanner){
scanner.stop();
}

}

</script>

</body>
</html>
