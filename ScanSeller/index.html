<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>SCAN RESI</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f2f2f2;
}

.header{
background:#16a34a;
color:white;
text-align:center;
padding:16px;
font-size:22px;
font-weight:bold;
}

.container{
padding:15px;
}

#reader{
width:100%;
margin-bottom:10px;
}

.scanbtn{
width:100%;
padding:15px;
background:#16a34a;
color:white;
border:none;
border-radius:10px;
font-size:18px;
margin-bottom:10px;
}

select{
width:100%;
padding:14px;
border-radius:10px;
border:1px solid #ccc;
margin-top:10px;
font-size:16px;
}

.total{
background:white;
margin-top:15px;
padding:15px;
border-radius:12px;
font-size:20px;
font-weight:bold;
text-align:right;
}

</style>

</head>

<body>

<div class="header">
SCAN RESI
</div>

<div class="container">

<div id="reader"></div>

<button class="scanbtn" onclick="simpanScan()">
SCAN PRODUK
</button>

<select id="seller"></select>

<select id="produk"></select>

<select id="harga">
<option value="70000">70000</option>
<option value="30000">30000</option>
</select>

<div class="total">
Total: Rp <span id="total">0</span>
</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbwZY-H_1eA9BIjmUKMVaT1r2xO9bJc4W2I1PjgJHMLrA468d2A1-pTXOla0H6temlNJ/exec";

let lastBarcode="";
let total=0;

/* bunyi tit */

function bunyi(){

const ctx=new AudioContext();
const osc=ctx.createOscillator();
const gain=ctx.createGain();

osc.type="square";
osc.frequency.value=900;

osc.connect(gain);
gain.connect(ctx.destination);

osc.start();

setTimeout(()=>{
osc.stop();
},120);

}

/* scan berhasil */

function onScanSuccess(decodedText){

lastBarcode=decodedText;

}

/* tombol scan */

function simpanScan(){

if(lastBarcode==""){
alert("Scan resi dulu");
return;
}

let seller=document.getElementById("seller").value;
let produk=document.getElementById("produk").value;
let harga=document.getElementById("harga").value;

bunyi();

fetch(API+"?action=scan"+
"&resi="+lastBarcode+
"&seller="+seller+
"&produk="+produk+
"&harga="+harga)

.then(res=>res.json())
.then(data=>{

total+=Number(harga);

document.getElementById("total").innerText=total;

lastBarcode="";

});

}

/* load seller */

function loadSeller(){

fetch(API+"?action=seller")
.then(res=>res.json())
.then(data=>{

let s=document.getElementById("seller");

s.innerHTML="";

data.forEach(v=>{

let o=document.createElement("option");
o.value=v;
o.textContent=v;

s.appendChild(o);

});

});

}

/* load produk */

function loadProduk(){

fetch(API+"?action=produk")
.then(res=>res.json())
.then(data=>{

let p=document.getElementById("produk");

p.innerHTML="";

data.forEach(v=>{

let o=document.createElement("option");
o.value=v;
o.textContent=v;

p.appendChild(o);

});

});

}

/* start scanner */

let scanner=new Html5QrcodeScanner(
"reader",
{fps:10,qrbox:250}
);

scanner.render(onScanSuccess);

/* load data */

loadSeller();
loadProduk();

</script>

</body>
</html>
