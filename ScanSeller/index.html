<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KEMOENIK SCAN</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/minified/html5-qrcode.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #f0f4f0; padding: 16px; }
        .header { background: #16a34a; color: white; padding: 16px; border-radius: 16px; margin-bottom: 16px; }
        .mode { display: flex; gap: 8px; margin-bottom: 16px; }
        .mode button { flex: 1; padding: 12px; border: none; border-radius: 30px; font-weight: bold; background: white; border: 2px solid #16a34a; color: #16a34a; }
        .mode button.active { background: #16a34a; color: white; }
        .card { background: white; border-radius: 16px; padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .resi-box { background: #f0fdf4; border: 2px solid #bbf7d0; border-radius: 12px; padding: 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 12px; }
        .resi-box.empty { background: #f9fafb; border-color: #e5e7eb; }
        .resi-icon { font-size: 24px; }
        .resi-label { font-size: 11px; color: #9ca3af; }
        .resi-number { font-weight: bold; font-size: 16px; word-break: break-all; }
        select, input { width: 100%; padding: 12px; border: 2px solid #e5e7eb; border-radius: 12px; margin-bottom: 12px; font-size: 16px; }
        .harga-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
        .harga-opt { border: 2px solid #e5e7eb; border-radius: 12px; padding: 12px; text-align: center; cursor: pointer; }
        .harga-opt.active { border-color: #16a34a; background: #f0fdf4; }
        .qty-control { display: flex; gap: 8px; align-items: center; }
        .qty-control button { width: 48px; height: 48px; border-radius: 12px; border: 2px solid #e5e7eb; background: white; font-size: 24px; }
        .qty-control input { flex: 1; text-align: center; margin-bottom: 0; }
        .total { background: linear-gradient(135deg, #15803d, #16a34a); color: white; border-radius: 16px; padding: 16px; margin-bottom: 16px; display: flex; justify-content: space-between; }
        .total-value { font-size: 32px; font-weight: bold; }
        .btn-primary { width: 100%; padding: 16px; background: #16a34a; color: white; border: none; border-radius: 30px; font-weight: bold; font-size: 18px; margin-bottom: 8px; }
        .btn-secondary { width: 100%; padding: 16px; background: white; border: 2px solid #e5e7eb; border-radius: 30px; font-weight: bold; }
        #reader { width: 100%; min-height: 300px; background: black; border-radius: 16px; overflow: hidden; margin-bottom: 16px; display: none; }
        .history-item { display: flex; align-items: center; gap: 12px; padding: 8px 0; border-top: 1px solid #eee; }
    </style>
</head>
<body>

<div class="header">
    <h2>KEMOENIK</h2>
    <p>Scanner Resi</p>
</div>

<div class="mode">
    <button id="btnNormal" class="active" onclick="setMode('normal')">📦 SCAN RESI</button>
    <button id="btnReturn" onclick="setMode('return')">🔄 SCAN RETURN</button>
</div>

<!-- Area scanner -->
<div id="reader"></div>

<!-- Hasil scan -->
<div class="resi-box empty" id="resiBox">
    <span class="resi-icon" id="resiIcon">📷</span>
    <div>
        <div class="resi-label">NOMOR RESI</div>
        <div class="resi-number" id="resiNumber">Arahkan kamera...</div>
    </div>
</div>

<!-- Form Normal -->
<div id="formNormal">
    <div class="card">
        <select id="sellerSelect">
            <option>Memuat seller...</option>
        </select>
        <select id="produkSelect">
            <option>Memuat produk...</option>
        </select>
        <div class="harga-row">
            <div class="harga-opt active" id="hargaSeller" onclick="pilihHarga('seller')">
                <div>HARGA SELLER</div>
                <div id="sellerPrice">—</div>
            </div>
            <div class="harga-opt" id="hargaAdmin" onclick="pilihHarga('admin')">
                <div>HARGA ADMIN</div>
                <div id="adminPrice">—</div>
            </div>
        </div>
        <div class="qty-control">
            <button onclick="ubahQty(-1)">−</button>
            <input type="number" id="qtyInput" value="1" min="1">
            <button onclick="ubahQty(1)">+</button>
        </div>
    </div>
</div>

<!-- Form Return -->
<div id="formReturn" style="display:none;">
    <div class="card">
        <select id="alasanSelect">
            <option>Tidak ada penerima</option>
            <option>Alamat tidak ditemukan</option>
            <option>Ditolak penerima</option>
            <option>Rusak</option>
            <option>Lainnya</option>
        </select>
        <div class="resi-box empty" id="returnBox">
            <span class="resi-icon">🔄</span>
            <div>
                <div class="resi-label">RESI RETURN</div>
                <div class="resi-number" id="returnNumber">Scan resi...</div>
            </div>
        </div>
    </div>
</div>

<!-- Total -->
<div class="total">
    <div>
        <div>TOTAL SESI</div>
        <div class="total-value" id="totalValue">Rp 0</div>
        <div id="totalSub">0 resi</div>
    </div>
    <div style="font-size:40px;">📦</div>
</div>

<!-- Tombol -->
<button class="btn-primary" id="startBtn" onclick="startScan()">📷 MULAI SCAN</button>
<button class="btn-primary" id="stopBtn" style="display:none; background:#dc2626;" onclick="stopScan()">⏹ STOP</button>
<button class="btn-secondary" onclick="resetSesi()">🔄 RESET</button>

<!-- History -->
<div class="card" id="historyCard" style="display:none; margin-top:16px;">
    <h4>Riwayat</h4>
    <div id="historyList"></div>
</div>

<script>
// ===== CONFIG =====
const API = "https://script.google.com/macros/s/AKfycbxBbG9GiW_fNu3hood8AXwMoMUXyl8iAc9VeaOIWqfO-3E1J4ra13wtsuZWRIddwSJZ/exec";

// ===== STATE =====
let lastBarcode = "";
let scanMode = "normal";
let html5QrCode = null;
let isScanning = false;
let totalSesi = 0;
let countSesi = 0;
let sejarahSesi = [];
let produkData = [];
let hargaMode = "seller";

// ===== INIT =====
window.onload = function() {
    loadSeller();
    loadProduk();
    setMode('normal');
};

// ===== LOAD SELLER =====
async function loadSeller() {
    try {
        const res = await fetch(API + "?action=seller");
        const data = await res.json();
        let html = '<option value="">Pilih Seller</option>';
        data.forEach(s => html += `<option value="${s.nama}">${s.nama}</option>`);
        document.getElementById('sellerSelect').innerHTML = html;
    } catch (e) {
        alert("Gagal load seller");
    }
}

// ===== LOAD PRODUK =====
async function loadProduk() {
    try {
        const res = await fetch(API + "?action=produk");
        produkData = await res.json();
        let html = '<option value="">Pilih Produk</option>';
        produkData.forEach(p => html += `<option value="${p.nama}">${p.nama}</option>`);
        document.getElementById('produkSelect').innerHTML = html;
        document.getElementById('produkSelect').addEventListener('change', updateHarga);
        updateHarga();
    } catch (e) {
        alert("Gagal load produk");
    }
}

function updateHarga() {
    const nama = document.getElementById('produkSelect').value;
    const produk = produkData.find(p => p.nama === nama);
    if (produk) {
        document.getElementById('sellerPrice').innerText = formatRp(produk.harga_seller);
        document.getElementById('adminPrice').innerText = formatRp(produk.harga_admin);
    } else {
        document.getElementById('sellerPrice').innerText = '—';
        document.getElementById('adminPrice').innerText = '—';
    }
}

// ===== SET MODE =====
function setMode(mode) {
    scanMode = mode;
    document.getElementById('btnNormal').className = mode === 'normal' ? 'active' : '';
    document.getElementById('btnReturn').className = mode === 'return' ? 'active' : '';
    document.getElementById('formNormal').style.display = mode === 'normal' ? 'block' : 'none';
    document.getElementById('formReturn').style.display = mode === 'return' ? 'block' : 'none';
    
    // Reset tampilan resi
    if (mode === 'normal') {
        document.getElementById('resiNumber').innerText = "Arahkan kamera...";
        document.getElementById('resiBox').className = "resi-box empty";
        document.getElementById('resiIcon').innerText = "📷";
    } else {
        document.getElementById('returnNumber').innerText = "Scan resi...";
        document.getElementById('returnBox').className = "resi-box empty";
    }
    lastBarcode = "";
    if (isScanning) stopScan();
}

// ===== START SCAN =====
async function startScan() {
    // Validasi
    if (scanMode === 'normal') {
        if (!document.getElementById('sellerSelect').value) { alert("Pilih seller"); return; }
        if (!document.getElementById('produkSelect').value) { alert("Pilih produk"); return; }
    }

    // Sembunyikan tombol start, tampilkan stop
    document.getElementById('startBtn').style.display = 'none';
    document.getElementById('stopBtn').style.display = 'block';
    document.getElementById('reader').style.display = 'block';

    // Inisialisasi scanner
    html5QrCode = new Html5Qrcode("reader");
    try {
        await html5QrCode.start(
            { facingMode: "environment" },
            { fps: 10, qrbox: 250 },
            onScanSuccess,
            onScanError
        );
        isScanning = true;
    } catch (err) {
        alert("Gagal akses kamera: " + err);
        stopScan();
    }
}

// ===== STOP SCAN =====
function stopScan() {
    if (html5QrCode && isScanning) {
        html5QrCode.stop().then(() => {
            html5QrCode = null;
        }).catch(() => {});
    }
    document.getElementById('reader').style.display = 'none';
    document.getElementById('startBtn').style.display = 'block';
    document.getElementById('stopBtn').style.display = 'none';
    isScanning = false;
}

// ===== ON SCAN SUCCESS =====
async function onScanSuccess(decodedText) {
    if (decodedText === lastBarcode) return;
    lastBarcode = decodedText;

    if (scanMode === 'return') {
        // Mode return
        const alasan = document.getElementById('alasanSelect').value;
        document.getElementById('returnNumber').innerText = decodedText;
        document.getElementById('returnBox').className = "resi-box";
        
        try {
            const res = await fetch(`${API}?action=scanReturn&resi=${encodeURIComponent(decodedText)}&alasan=${encodeURIComponent(alasan)}`);
            const data = await res.json();
            if (data.status === 'ok') {
                alert(`Return sukses: ${data.produk} x${data.qty}`);
                beepSukses();
            } else {
                alert("Gagal: " + data.pesan);
                document.getElementById('returnBox').className = "resi-box empty";
                beepError();
            }
        } catch (e) {
            alert("Koneksi error");
            document.getElementById('returnBox').className = "resi-box empty";
        }
        setTimeout(() => { lastBarcode = ""; }, 2000);
        return;
    }

    // Mode normal
    document.getElementById('resiNumber').innerText = decodedText;
    document.getElementById('resiBox').className = "resi-box";
    document.getElementById('resiIcon').innerText = "✅";

    const seller = document.getElementById('sellerSelect').value;
    const produk = document.getElementById('produkSelect').value;
    const harga = getHargaTerpilih();
    const qty = parseInt(document.getElementById('qtyInput').value) || 1;

    try {
        const res = await fetch(`${API}?action=scan&resi=${encodeURIComponent(decodedText)}&seller=${encodeURIComponent(seller)}&produk=${encodeURIComponent(produk)}&harga=${harga}&qty=${qty}`);
        const data = await res.json();
        if (data.status === 'ok') {
            totalSesi += harga;
            countSesi++;
            sejarahSesi.unshift({ resi: decodedText, produk, harga, status: 'ok' });
            updateTotal();
            renderHistory();
            beepSukses();
        } else if (data.status === 'duplikat') {
            alert("Resi sudah ada");
            document.getElementById('resiBox').className = "resi-box empty";
            document.getElementById('resiIcon').innerText = "⚠️";
            sejarahSesi.unshift({ resi: decodedText, produk, harga, status: 'duplikat' });
            renderHistory();
            beepError();
        } else {
            alert("Gagal: " + data.pesan);
            document.getElementById('resiBox').className = "resi-box empty";
            document.getElementById('resiIcon').innerText = "📷";
            beepError();
        }
    } catch (e) {
        alert("Koneksi error");
        document.getElementById('resiBox').className = "resi-box empty";
        document.getElementById('resiIcon').innerText = "📷";
    }
    setTimeout(() => { lastBarcode = ""; }, 2000);
}

function onScanError(err) {
    // ignore
}

// ===== UI =====
function ubahQty(delta) {
    const inp = document.getElementById('qtyInput');
    let v = parseInt(inp.value) || 1;
    v = Math.min(100, Math.max(1, v + delta));
    inp.value = v;
}

function pilihHarga(mode) {
    hargaMode = mode;
    document.getElementById('hargaSeller').classList.toggle('active', mode === 'seller');
    document.getElementById('hargaAdmin').classList.toggle('active', mode === 'admin');
}

function getHargaTerpilih() {
    const nama = document.getElementById('produkSelect').value;
    const produk = produkData.find(p => p.nama === nama);
    if (!produk) return 0;
    return hargaMode === 'seller' ? produk.harga_seller : produk.harga_admin;
}

function updateTotal() {
    document.getElementById('totalValue').innerText = formatRp(totalSesi);
    document.getElementById('totalSub').innerText = countSesi + " resi";
}

function renderHistory() {
    const card = document.getElementById('historyCard');
    card.style.display = 'block';
    let html = '';
    sejarahSesi.slice(0, 20).forEach(h => {
        html += `<div class="history-item">
            <div>${h.status === 'duplikat' ? '⚠️' : '✅'}</div>
            <div style="flex:1"><b>${h.resi}</b><br><small>${h.produk}</small></div>
            <div>${h.status === 'duplikat' ? 'DUPLIKAT' : formatRp(h.harga)}</div>
        </div>`;
    });
    document.getElementById('historyList').innerHTML = html;
}

function resetSesi() {
    if (isScanning) stopScan();
    totalSesi = 0;
    countSesi = 0;
    sejarahSesi = [];
    updateTotal();
    document.getElementById('historyCard').style.display = 'none';
    document.getElementById('historyList').innerHTML = '';
    document.getElementById('resiNumber').innerText = "Arahkan kamera...";
    document.getElementById('resiBox').className = "resi-box empty";
    document.getElementById('resiIcon').innerText = "📷";
}

// ===== BEEP =====
function beepSukses() {
    try {
        const ctx = new AudioContext();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = 900;
        gain.gain.value = 0.2;
        osc.start();
        setTimeout(() => { osc.stop(); ctx.close(); }, 80);
        setTimeout(() => {
            const osc2 = ctx.createOscillator();
            osc2.connect(gain);
            osc2.frequency.value = 1200;
            osc2.start();
            setTimeout(() => { osc2.stop(); }, 100);
        }, 90);
    } catch (e) {}
}

function beepError() {
    try {
        const ctx = new AudioContext();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = 300;
        gain.gain.value = 0.2;
        osc.start();
        setTimeout(() => { osc.stop(); ctx.close(); }, 200);
    } catch (e) {}
}

function formatRp(n) {
    return "Rp " + (n || 0).toLocaleString('id-ID');
}
</script>

</body>
</html>
