<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>SCAN RESI</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Arial;
background:#f4f6f8;
margin:0;
}

.header{
background:#16a34a;
color:white;
text-align:center;
padding:15px;
font-size:20px;
font-weight:bold;
}

.container{
padding:20px;
}

select{
width:100%;
padding:10px;
margin-bottom:10px;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:8px;
font-size:16px;
}

.start{
background:#16a34a;
color:white;
}

.stop{
background:#ef4444;
color:white;
}

#reader{
margin-top:15px;
}

</style>

</head>

<body>

<div class="header">
SCAN RESI
</div>

<div class="container">

<label>Seller</label>
<select id="seller">

<option>LUNISCA2026-01</option>
<option>ALNISHOP2020-02</option>
<option>SEHATBARENG2026-03</option>

</select>

<label>Produk</label>
<select id="produk">

<option>KEMOENIK SLIM</option>

</select>

<label>Harga</label>
<select id="harga">

<option value="70000">70000</option>
<option value="30000">30000</option>

</select>

<button class="start" onclick="startScan()">START SCAN</button>

<button class="stop" onclick="stopScan()">STOP SCAN</button>

<div id="reader"></div>

</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbx87tt-MUpUG_nNSHVQ4N7_N0N6ORhjOR6yk8Fcvq_rHK6m8_tl708CRgAk1UI_o0bN/exec";

let scanner;

function bunyi(){

const context=new(window.AudioContext||window.webkitAudioContext)();
const oscillator=context.createOscillator();
const gain=context.createGain();

oscillator.type="square";
oscillator.frequency.value=1000;

oscillator.connect(gain);
gain.connect(context.destination);

oscillator.start();

setTimeout(()=>{
oscillator.stop();
},120);

}

function startScan(){

scanner=new Html5Qrcode("reader");

scanner.start(
{ facingMode: "environment" },
{ fps:10, qrbox:250 },

(decodedText)=>{

bunyi();

let seller=document.getElementById("seller").value;
let produk=document.getElementById("produk").value;
let harga=document.getElementById("harga").value;

fetch(API_URL+"?action=simpan&resi="+decodedText+"&seller="+seller+"&produk="+produk+"&harga="+harga)

.then(res=>res.json())
.then(data=>{

console.log("tersimpan");

});

}

);

}

function stopScan(){

if(scanner){
scanner.stop().then(()=>{
console.log("scanner berhenti");
});
}

}

</script>

</body>
</html>
