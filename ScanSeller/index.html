<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>SCAN RESI</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f3f3f3;
}

.header{
background:#16a34a;
color:white;
text-align:center;
padding:15px;
font-size:22px;
font-weight:bold;
}

.container{
padding:15px;
}

#reader{
width:100%;
margin-bottom:15px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:8px;
font-size:16px;
margin-top:10px;
}

.scan{
background:#16a34a;
color:white;
}

select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

.total{
margin-top:20px;
background:white;
padding:15px;
border-radius:10px;
font-size:20px;
font-weight:bold;
text-align:right;
}

</style>

</head>

<body>

<div class="header">
SCAN RESI
</div>

<div class="container">

<div id="reader"></div>

<button class="scan" onclick="scanManual()">
SCAN RESI
</button>

<select id="seller"></select>

<select id="produk"></select>

<select id="harga">
<option value="70000">70000</option>
<option value="30000">30000</option>
</select>

<div class="total">
Total: Rp <span id="total">0</span>
</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbwMKriFGgT9WLy3AGVXPNoK8aY9PdCOBjrNKIEQkjzXAKjGVwp8113faSyUDHGiGoE6/exec";

let lastBarcode="";
let total=0;

function bunyi(){

const ctx=new AudioContext();
const osc=ctx.createOscillator();
const gain=ctx.createGain();

osc.type="square";
osc.frequency.value=900;

osc.connect(gain);
gain.connect(ctx.destination);

osc.start();

setTimeout(()=>{
osc.stop();
},120);

}

function onScanSuccess(decodedText){

lastBarcode=decodedText;

}

function scanManual(){

if(lastBarcode==""){
alert("Scan resi dulu");
return;
}

var seller=document.getElementById("seller").value;
var produk=document.getElementById("produk").value;
var harga=document.getElementById("harga").value;

bunyi();

fetch(API+"?action=scan"+
"&resi="+lastBarcode+
"&seller="+seller+
"&produk="+produk+
"&harga="+harga)

.then(r=>r.json())
.then(d=>{

total+=Number(harga);

document.getElementById("total").innerText=total;

lastBarcode="";

});

}

function loadSeller(){

fetch(API+"?action=seller")
.then(r=>r.json())
.then(data=>{

var s=document.getElementById("seller");

data.forEach(v=>{
var o=document.createElement("option");
o.value=v;
o.textContent=v;
s.appendChild(o);
});

});

}

function loadProduk(){

fetch(API+"?action=produk")
.then(r=>r.json())
.then(data=>{

var s=document.getElementById("produk");

data.forEach(v=>{
var o=document.createElement("option");
o.value=v;
o.textContent=v;
s.appendChild(o);
});

});

}

let scanner=new Html5QrcodeScanner(
"reader",
{fps:10,qrbox:250}
);

scanner.render(onScanSuccess);

loadSeller();
loadProduk();

</script>

</body>
</html>
