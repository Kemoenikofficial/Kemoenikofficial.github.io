<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Verifikasi Kode Konsultasi - Kemoenik</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e6f4ea 0%, #f5fdf8 60%, #ffffff 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 35px 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
        }

        .logo {
            text-align: center;
            margin-bottom: 25px;
        }

        .logo img {
            width: 90px;
            border-radius: 50%;
            margin-bottom: 10px;
        }

        .logo h2 {
            font-size: 22px;
            font-weight: 600;
        }

        .logo p {
            font-size: 14px;
            color: #888;
            margin-top: 5px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            font-size: 13px;
            font-weight: 600;
            color: #555;
            margin-bottom: 8px;
            display: block;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
        }

        input {
            width: 100%;
            padding: 14px 14px 14px 45px;
            border-radius: 12px;
            border: 2px solid #e8e8e8;
            font-size: 15px;
            background: #fafafa;
        }

        input:focus {
            outline: none;
            border-color: #16a34a;
            background: white;
            box-shadow: 0 0 0 4px rgba(22, 163, 74, 0.1);
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #16a34a 0%, #4ade80 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            margin-top: 10px;
            cursor: pointer;
        }

        button.loading .btn-text {
            display: none;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: none;
            margin: 0 auto;
        }

        button.loading .spinner {
            display: block;
        }

        .result-box {
            margin-top: 25px;
            padding: 20px;
            border-radius: 12px;
            color: white;
        }

        .success {
            background: linear-gradient(135deg, #11998e, #38ef7d);
        }

        .warning {
            background: linear-gradient(135deg, #f2994a, #f2c94c);
        }

        .error {
            background: linear-gradient(135deg, #eb3349, #f45c43);
        }

        .date-info {
            margin-top: 15px;
            font-size: 13px;
        }

        .btn-lanjut {
            display: none;
            margin-top: 15px;
            text-align: center;
            padding: 14px;
            border-radius: 12px;
            border: 2px solid #16a34a;
            color: #16a34a;
            text-decoration: none;
            font-weight: 600;
        }

        .btn-lanjut:hover {
            background: #16a34a;
            color: white;
        }

        .footer {
            text-align: center;
            margin-top: 25px;
            font-size: 13px;
            color: #888;
        }

        .link-bantuan {
            color: #16a34a;
            font-weight: 600;
            text-decoration: none;
        }

        .link-bantuan:hover {
            text-decoration: underline;
        }

        /* Modal Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            animation: slideUp 0.3s ease;
        }

        .modal-icon {
            font-size: 48px;
            color: #16a34a;
            margin-bottom: 15px;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 10px;
            color: #333;
        }

        .modal-desc {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .modal-btn-primary {
            background: #16a34a;
            color: white;
        }

        .modal-btn-secondary {
            background: #f3f4f6;
            color: #374151;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="https://i.postimg.cc/3JZ3Y0K0/Logo-Kemoenik-jpg.jpg" alt="Logo Kemoenik">
            <h2>Kemoenik</h2>
            <p>Verifikasi Kode Konsultasi</p>
        </div>

        <div class="form-group">
            <label>Nama Lengkap</label>
            <div class="input-wrapper">
                <i class="fas fa-user"></i>
                <input type="text" id="nama" placeholder="Masukkan nama lengkap" required>
            </div>
        </div>

        <div class="form-group">
            <label>Nomor WhatsApp</label>
            <div class="input-wrapper">
                <i class="fab fa-whatsapp"></i>
                <input type="tel" id="wa" placeholder="Contoh: 08123456789" required>
            </div>
        </div>

        <div class="form-group">
            <label>Kode Konsultasi</label>
            <div class="input-wrapper">
                <i class="fas fa-ticket-alt"></i>
                <input type="text" id="kode" placeholder="Masukkan kode unik" required>
            </div>
        </div>

        <button id="btnCek" onclick="cekKode()">
            <span class="btn-text">Cek Kode</span>
            <div class="spinner"></div>
        </button>

        <a id="btnLanjutManual" class="btn-lanjut">
            🔓 Akses Panduan
        </a>

        <div id="result"></div>

        <div class="footer">
            Butuh bantuan? 
            <a href="https://wa.me/6281546450547?text=Halo%20admin,%20saya%20butuh%20bantuan%20kode%20konsultasi" target="_blank" class="link-bantuan">
                Hubungi kami
            </a>
        </div>
    </div>

    <!-- Modal untuk Pilihan Program -->
    <div id="programChoiceModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-icon">
                <i class="fas fa-history"></i>
            </div>
            <div class="modal-title">Data Lama Ditemukan</div>
            <div class="modal-desc">
                Nomor WA ini sudah memiliki data program sebelumnya. Apakah Anda ingin melanjutkan program lama atau memulai program baru?
            </div>
            <div class="modal-buttons">
                <button class="modal-btn modal-btn-secondary" onclick="continueOldProgram()">
                    Lanjutkan Lama
                </button>
                <button class="modal-btn modal-btn-primary" onclick="startNewProgram()">
                    Mulai Baru
                </button>
            </div>
        </div>
    </div>

    <script>
        // Normalisasi nomor WA ke format 628
        function normalizeWA(wa) {
            wa = wa.replace(/\D/g, ''); // Hapus semua non-digit
            
            if (wa.startsWith('08')) {
                return '62' + wa.substring(1);
            } else if (wa.startsWith('+62')) {
                return wa.substring(1);
            } else if (wa.startsWith('62')) {
                return wa;
            } else if (wa.startsWith('0')) {
                return '62' + wa.substring(1);
            }
            
            return wa;
        }

        let tempData = {}; // Untuk menyimpan data sementara saat modal muncul

        function cekKode() {
            const nama = document.getElementById("nama").value.trim();
            const wa = document.getElementById("wa").value.trim();
            const kode = document.getElementById("kode").value.trim();
            const btn = document.getElementById("btnCek");
            const result = document.getElementById("result");
            const btnLanjut = document.getElementById("btnLanjutManual");

            result.innerHTML = "";
            btnLanjut.style.display = "none";

            if (nama.length < 3) return show("error", "Nama tidak valid");
            if (wa.replace(/\D/g, '').length < 10) return show("error", "Nomor tidak valid");
            if (kode.length < 6) return show("error", "Kode tidak valid");

            const normalizedWA = normalizeWA(wa);

            btn.classList.add("loading");

            // Kirim ke Apps Script dengan parameter wa untuk validasi
            fetch(`https://script.google.com/macros/s/AKfycbyEzIIntNL_LO2imvYtXzULGeX_KTyDlnZlAzE4PkjAIOiuwbkTsTQEIUr8k_8qIFm2/exec?action=verify&kode=${encodeURIComponent(kode)}&nama=${encodeURIComponent(nama)}&wa=${encodeURIComponent(normalizedWA)}&_=${Date.now()}`)
                .then(res => res.json())
                .then(data => {
                    btn.classList.remove("loading");
                    
                    if (data.status === "SUCCESS") {
                        // Voucher berhasil diaktifkan
                        show("success", `Kode berhasil diaktifkan 🎉<br>Voucher aktif sampai tanggal ${formatDate(data.tanggal_expired)}`);
                        
                        // Cek apakah WA ini sudah punya data
                        checkExistingData(normalizedWA, kode, false);
                        
                    } else if (data.status === "ACTIVE_SAME_WA") {
                        // Voucher sudah aktif dengan WA yang sama → lanjutkan
                        show("success", "Kode masih aktif. Selamat datang kembali!");
                        setTimeout(() => {
                            redirectToPanduan(normalizedWA, kode);
                        }, 1500);
                        
                    } else if (data.status === "ACTIVE_DIFFERENT_WA") {
                        // Voucher sudah aktif dengan WA berbeda → tolak
                        show("error", "Kode ini sudah digunakan oleh nomor WA lain.");
                        
                    } else if (data.status === "EXPIRED") {
                        show("warning", "Kode sudah expired.");
                        
                    } else if (data.status === "INVALID") {
                        show("error", "Kode tidak ditemukan.");
                        
                    } else {
                        show("error", "Terjadi kesalahan. Silakan coba lagi.");
                    }
                })
                .catch(() => {
                    btn.classList.remove("loading");
                    show("error", "Gagal terhubung ke server.");
                });
        }

        function checkExistingData(wa, voucher, isNewVoucher) {
            // Cek di localStorage apakah WA ini sudah punya data
            const existingData = localStorage.getItem(`calfatloss_data_${wa}`);
            
            if (existingData && isNewVoucher) {
                // Jika pakai voucher baru tapi WA lama punya data → tampilkan pilihan
                tempData = { wa, voucher };
                document.getElementById("programChoiceModal").style.display = "flex";
            } else {
                // Langsung redirect
                redirectToPanduan(wa, voucher);
            }
        }

        function continueOldProgram() {
            // Tutup modal dan redirect tanpa reset data
            document.getElementById("programChoiceModal").style.display = "none";
            redirectToPanduan(tempData.wa, tempData.voucher);
        }

        function startNewProgram() {
            // Reset program_history untuk WA ini
            localStorage.removeItem(`calfatloss_weekly_${tempData.wa}`);
            
            // Tandai bahwa ini program baru
            localStorage.setItem(`calfatloss_newprogram_${tempData.wa}`, 'true');
            
            document.getElementById("programChoiceModal").style.display = "none";
            redirectToPanduan(tempData.wa, tempData.voucher);
        }

        function redirectToPanduan(wa, voucher) {
            // Simpan ke localStorage untuk persistensi
            localStorage.setItem('calfatloss_wa', wa);
            localStorage.setItem('calfatloss_voucher', voucher);
            
            // Redirect dengan parameter WA (bukan kode)
            setTimeout(() => {
                window.location.href = `/panduan/?wa=${encodeURIComponent(wa)}&voucher=${encodeURIComponent(voucher)}`;
            }, 500);
        }

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const date = new Date(dateStr);
            return date.toLocaleDateString('id-ID', {
                day: 'numeric',
                month: 'long',
                year: 'numeric'
            });
        }

        function show(type, msg) {
            document.getElementById("result").innerHTML = `<div class="result-box ${type}">${msg}</div>`;
        }
    </script>
</body>
</html>
